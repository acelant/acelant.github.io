<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat IA</title>
</head>
<body>
  <h3>Chat IA</h3>

  <input id="msg" placeholder="Digite sua pergunta" />
  <button onclick="send()">Enviar</button>

  <pre id="resp"></pre>

  <script>
    async function send() {
      const msg = document.getElementById("msg").value;

      const res = await fetch(
        "https://hml.n8n.3web.hmldesbravador.com/webhook/d0c64807-8b9f-47bc-82e8-56ffdc6a4309/chat",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: msg,
            sessionId: "demo-web"
          })
        }
      );

      const data = await res.json();
      document.getElementById("resp").innerText = data.answer || JSON.stringify(data);
    }
  </script>
</body>
</html>
